<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المليجي | Super Elite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --main: #8b5cf6; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --success: #10b981; --danger: #ef4444; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
        
        header { background: linear-gradient(135deg, #6d28d9, #1e1b4b); padding: 30px 20px; text-align: center; border-radius: 0 0 40px 40px; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: -40px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        
        .tab-nav { display: flex; background: var(--card); margin: 20px 0; border-radius: 15px; padding: 5px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: none; color: #94a3b8; cursor: pointer; border-radius: 10px; font-weight: bold; }
        .tab-btn.active { background: var(--main); color: white; }

        .item-card { background: var(--card); padding: 15px; border-radius: 18px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-right: 5px solid var(--main); animation: fadeIn 0.3s ease; }
        .item-card.expense { border-right-color: var(--danger); }
        .item-card.paid { border-right-color: var(--success); }

        .btn-receipt { background: #f59e0b; color: white; border: none; padding: 5px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; }
        
        #receipt-box { position: fixed; top: -2000px; width: 300px; background: white; color: black; padding: 25px; text-align: center; border: 2px solid #000; }

        input, select { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--card); color: white; margin-bottom: 10px; box-sizing: border-box; }
        .btn-add { background: var(--success); color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }

        nav { position: fixed; bottom: 15px; left: 15px; right: 15px; background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(10px); border-radius: 25px; display: flex; justify-content: space-around; padding: 15px; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="receipt-box">
        <h2 style="margin:0">إيصال سداد</h2>
        <p>نظام بسملة محمد عزت</p>
        <div style="border-top: 2px dashed #000; margin: 15px 0;"></div>
        <p>العميل المكرم:</p>
        <h3 id="rc-name">اسم العميل</h3>
        <h1 id="rc-amt">000 ج.م</h1>
        <p id="rc-date"></p>
        <div style="border-top: 2px dashed #000; margin: 15px 0;"></div>
        <p>طما - سوهاج</p>
    </div>

    <header>
        <h3 style="margin:0">نظام المليجي | Super Elite</h3>
        <p style="font-size: 12px; opacity: 0.8;">بإدارة: بسملة محمد عزت</p>
    </header>

    <div class="container">
        <div class="stat-grid">
            <div class="stat-card"><small>الخزينة (أقساط)</small><br><b id="p-total" style="color:var(--success)">0</b></div>
            <div class="stat-card"><small>المصروفات</small><br><b id="e-total" style="color:var(--danger)">0</b></div>
        </div>

        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('in', this)">💰 الأقساط</button>
            <button class="tab-btn" onclick="switchTab('out', this)">💸 المصروفات</button>
        </div>

        <section id="data-view" class="view-section active">
            <div id="list-container"></div>
        </section>

        <section id="add-view" class="view-section">
            <div class="stat-card" style="text-align: right;">
                <h4 id="form-title">إضافة قسط</h4>
                <input type="text" id="name" placeholder="الاسم أو البيان">
                <input type="number" id="amt" placeholder="المبلغ">
                <input type="number" id="day" placeholder="يوم الاستحقاق (اختياري)">
                <button class="btn-add" onclick="save()">حفظ العملية ✅</button>
            </div>
        </section>
    </div>

    <nav>
        <button onclick="showView('data-view')" style="background:none; border:none; font-size:24px;">📋</button>
        <button onclick="showView('add-view')" style="background:none; border:none; font-size:24px;">➕</button>
        <button onclick="clearData()" style="background:none; border:none; font-size:24px;">🧹</button>
    </nav>

    <script>
        let db = JSON.parse(localStorage.getItem('meligy_v8')) || [];
        let currentTab = 'in';

        function showView(id) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            render();
        }

        function switchTab(tab, btn) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('form-title').innerText = tab === 'in' ? 'إضافة قسط' : 'إضافة مصروف';
            render();
        }

        function save() {
            let n = document.getElementById('name').value, a = document.getElementById('amt').value, d = document.getElementById('day').value;
            if(!n || !a) return alert("املي البيانات يا بسملة");
            db.push({id: Date.now(), n, a: parseFloat(a), d, type: currentTab, pd: false});
            localStorage.setItem('meligy_v8', JSON.stringify(db));
            document.getElementById('name').value = ''; document.getElementById('amt').value = '';
            showView('data-view');
        }

        function toggleStatus(id) {
            db = db.map(x => x.id === id ? {...x, pd: !x.pd} : x);
            localStorage.setItem('meligy_v8', JSON.stringify(db));
            render();
        }

        function printReceipt(n, a) {
            document.getElementById('rc-name').innerText = n;
            document.getElementById('rc-amt').innerText = a + " ج.م";
            document.getElementById('rc-date').innerText = "تاريخ السداد: " + new Date().toLocaleDateString('ar-EG');
            
            html2canvas(document.getElementById('receipt-box')).then(canvas => {
                let link = document.createElement('a');
                link.download = `إيصال_${n}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        function render() {
            let cont = document.getElementById('list-container'), pTotal = 0, eTotal = 0;
            cont.innerHTML = "";
            
            db.forEach(i => {
                if(i.type === 'in') pTotal += (i.pd ? i.a : 0); else eTotal += i.a;

                if(i.type === currentTab) {
                    cont.innerHTML += `
                        <div class="item-card ${i.type === 'out' ? 'expense' : ''} ${i.pd ? 'paid' : ''}">
                            <div>
                                <b>${i.n}</b><br>
                                <small>${i.a} ج.م ${i.d ? '| يوم ' + i.d : ''}</small>
                            </div>
                            <div style="display:flex; gap:10px;">
                                ${i.pd && i.type === 'in' ? `<button class="btn-receipt" onclick="printReceipt('${i.n}', ${i.a})">🎫 إيصال</button>` : ''}
                                ${i.type === 'in' ? `<button onclick="toggleStatus(${i.id})" style="border:none; background:none; font-size:20px;">${i.pd ? '✅' : '⏳'}</button>` : '<button onclick="del('+i.id+')" style="border:none; background:none;">🗑️</button>'}
                            </div>
                        </div>`;
                }
            });
            document.getElementById('p-total').innerText = pTotal + " ج";
            document.getElementById('e-total').innerText = eTotal + " ج";
        }

        function del(id) {
            db = db.filter(x => x.id !== id);
            localStorage.setItem('meligy_v8', JSON.stringify(db));
            render();
        }

        function clearData() {
            if(confirm("هل تريدين مسح كافة البيانات يا بسملة؟")) {
                localStorage.removeItem('meligy_v8');
                db = [];
                render();
            }
        }

        render();
    </script>
</body>
</html>
